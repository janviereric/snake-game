<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--  font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;700&family=Roboto+Condensed:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- fontawesome -->
    <script
      src="https://kit.fontawesome.com/5a38324862.js"
      crossorigin="anonymous"
    ></script>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico" />
    <title>Snake Game</title>
    <script src="../assets/javascripts/exports.js" type="module"></script>
    <script src="./play.js" type="module"></script>
  </head>
  <body>
    <header>
      <div class="container-title-logo">
        <h1 class="text-title-logo">Snake Game</h1>
      </div>
    </header>
    <main>
      <div id="container-menu" class="off">
        <div class="calc">
          <div class="menu">
            <div class="menu-home">
              <div id="menu-image"></div>
              <div class="menu-buttons">
                <button id="button-play" class="button-primary">▷ Jouer</button>
                <div id="button-params" class="button-secondary"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="container-keyboard-key"></div>
      <div id="container-game">
        <canvas width="600px" height="600px"></canvas>
      </div>
    </main>
    <footer>
      <div id="container-copyright-logo"></div>
    </footer>
  </body>
</html>
